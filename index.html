<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
/* mobile */

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{max-width:430px;margin:0 auto;overflow-x:hidden;background:#EEF2F8}body,button,input,textarea,div,select{font-family:'Be Vietnam Pro','Noto Sans SC',sans-serif}
:root{--nv:#1B3A6B;--gd:#E8A830;--br:#E2DDD5;--mu:#8A8480;--red:#E24B4A}
.hdr{background:var(--nv);padding:10px 14px;display:flex;flex-direction:column;gap:9px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:Georgia,serif;font-size:20px;color:#fff;letter-spacing:2px;font-weight:700;line-height:1}
.logos{font-size:11px;color:#9FE1CB;letter-spacing:1px;margin-top:2px}
.hdr-r{display:flex;align-items:center;gap:5px;flex-shrink:0}
.nb-sm{width:40px;height:40px;border-radius:7px;border:1.5px solid rgba(255,255,255,0.75);background:transparent;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0;touch-action:manipulation}
.nb-sm.on{background:var(--gd);border-color:var(--gd);color:#111}
.cart-rel{position:relative;flex-shrink:0}
.cbadge{position:absolute;top:-4px;right:-4px;background:var(--gd);color:#111;width:14px;height:14px;border-radius:50%;font-size:8px;font-weight:700;align-items:center;justify-content:center;display:none}
.nb-wide{flex:1 1 40%;height:44px;padding:0 10px;border-radius:8px;border:2px solid rgba(255,255,255,0.75);background:transparent;color:#fff;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;user-select:none;touch-action:manipulation}
.nb-wide.on{background:var(--gd);border-color:var(--gd);color:#111}
.hdr-modes{display:flex;gap:6px;flex-wrap:wrap}
.greet-bar{background:#EEF2F8;border-bottom:1px solid #C5D0E0;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.greet-txt{font-size:16px;font-weight:700;color:var(--nv)}.greet-sub{font-size:13px;color:#333;margin-top:1px}
.greet-btn{font-size:13px;font-weight:700;color:var(--nv);background:#fff;border:1.5px solid var(--nv);border-radius:6px;padding:6px 12px;cursor:pointer}
.cbar{background:#fff;padding:11px 14px;border:2px solid var(--nv);border-radius:12px;margin:14px 14px 10px;box-shadow:none}
.ci{width:100%;background:transparent;border:none;border-radius:0;padding:0;font-size:16px;color:var(--nv);outline:none;box-shadow:none}
.tabs{display:flex;gap:7px;padding:10px 12px;background:#EEF2F8;border-bottom:1px solid #C5D0E0}
.tab{flex:1;height:44px;border-radius:8px;border:2px solid var(--nv);background:#fff;color:var(--nv);font-size:15px;font-weight:700;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;white-space:nowrap;user-select:none;touch-action:manipulation;min-width:0;overflow:hidden}
.tab.on{background:var(--gd);border-color:var(--gd);color:#111}
.sec{padding:12px 14px 5px;font-size:13px;letter-spacing:1px;text-transform:uppercase;color:var(--nv);opacity:.9;font-weight:700;background:#EEF2F8}
.lst{padding:0 12px 8px;display:flex;flex-direction:column;gap:10px;background:#EEF2F8}
.row{background:#fff;border-radius:16px;border:1px solid #D7E0EC;display:flex;align-items:center;gap:12px;padding:12px 13px;box-shadow:0 4px 12px rgba(27,58,107,.08)}
.em{font-size:20px;width:72px;height:72px;background:#EEF2F8;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;overflow:hidden}
.em:hover{background:#D8E4F0}
.em img{width:100%;height:100%;object-fit:cover;display:block}
.menu-main{flex:1;min-width:0;cursor:pointer}
.nm{font-size:19px;font-weight:700;color:#111;cursor:pointer;line-height:1.35}
.nm:hover{color:var(--nv)}
.zn{font-size:15px;color:#555;font-weight:500;margin-top:4px;line-height:1.45}
.pr{font-size:18px;font-weight:700;color:var(--nv);margin-top:6px}
.ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qb{width:52px;height:52px;border-radius:50%;border:1.5px solid #D7E0EC;background:#fff;font-size:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;color:var(--nv);touch-action:manipulation;box-shadow:0 4px 10px rgba(27,58,107,.12)}
.qb.p{background:var(--nv);border-color:var(--nv);color:#fff;box-shadow:0 6px 14px rgba(27,58,107,.22)}
.qn{font-size:14px;font-weight:700;min-width:18px;text-align:center;color:var(--nv)}
.cmbo{background:#fff;border-radius:12px;border:2px solid var(--nv);padding:15px;margin:0 12px 8px;color:#111;cursor:pointer}
.cmbo:hover{opacity:.92}
.nt{padding:9px 13px 13px;background:#EEF2F8;border-top:1px solid #C5D0E0}
.nt textarea{width:100%;border:1.5px solid var(--br);border-radius:9px;padding:10px 12px;font-size:14px;resize:none;background:#FAF8F4;outline:none;color:#333}
.shop-item{background:#fff;border-radius:14px;border:1px solid #D7E0EC;padding:12px 13px;margin:0 12px 10px;box-shadow:0 4px 12px rgba(27,58,107,.08)}
.scat{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;display:inline-block;margin-bottom:3px}
.cat-a{background:#EEF2F8;color:var(--nv)}.cat-b{background:#FEF3C7;color:#92400E}
.sf{display:flex;align-items:center;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid #EDE8DF}
.bot{background:var(--nv);padding:10px 13px;padding-bottom:max(16px,env(safe-area-inset-bottom,16px))}
.cart-btn{width:100%;height:56px;border-radius:10px;border:2px solid rgba(255,255,255,0.75);background:transparent;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:0 16px;user-select:none;touch-action:manipulation}
.cart-btn.empty{color:rgba(255,255,255,0.4);border-color:rgba(255,255,255,0.3)}
.vcnt{background:var(--gd);color:#111;width:22px;height:22px;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.vtot{font-size:15px;font-weight:700;color:var(--gd)}
.pg{display:none}.pg.on{display:block}
.bk{height:34px;padding:0 13px;border-radius:8px;border:2px solid rgba(255,255,255,0.75);background:transparent;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;user-select:none}
.ci2{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--br);background:#fff}
.ci2x{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:2px 5px;line-height:1}
.tr{display:flex;justify-content:space-between;align-items:center;padding:14px;background:#fff;border-top:2px solid var(--br)}
.obtn{display:block;width:calc(100% - 26px);margin:10px 13px;background:var(--nv);color:#fff;border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;text-align:center;touch-action:manipulation}
.obtn:disabled{background:var(--br);color:var(--mu);cursor:not-allowed}
.cc{display:none}
.cc input{width:100%;background:#fff;border:1.5px solid #C5D0E0;border-radius:9px;padding:11px 13px;font-size:16px;color:var(--nv);outline:none}
.cc input.err{border-color:var(--red);background:#fff5f5;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.warn{margin:0 14px;background:#fff3cd;border:1.5px solid #ffc107;border-radius:9px;padding:9px 13px;font-size:13px;color:#664d03;display:none;line-height:1.6}
.toast-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.8);background:#E24B4A;color:#fff;padding:16px 24px;border-radius:14px;font-size:16px;font-weight:700;text-align:center;z-index:9999;max-width:85vw;line-height:1.7;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 8px 30px rgba(226,75,74,.4)}
.toast-msg.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.warn.on{display:block}
.room-input-wrap{padding:12px 14px;background:#fff;border:2px solid var(--nv);border-radius:10px;margin:10px 14px;display:none}
.room-input-wrap.show{display:block}
.room-input-lbl{font-size:17px;font-weight:800;color:var(--red);margin-bottom:6px}
.room-inp{width:100%;background:#fff;border:none;border-radius:0;padding:0;font-size:16px;color:var(--nv);outline:none;box-shadow:none}
.room-inp.err{border:none;background:#fff5f5;border-radius:8px;padding:10px 13px}
.opt-section{padding:10px 14px;background:#fff;border-bottom:1px solid var(--br)}
.opt-title{font-size:15px;font-weight:700;color:var(--nv);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;opacity:.9}
.opt-row{display:flex;gap:7px}
.opt-btn{flex:1;padding:9px 8px;border-radius:9px;border:2px solid var(--br);background:#fff;cursor:pointer;user-select:none;display:flex;align-items:center;gap:8px}
.opt-btn.on{border-color:var(--nv);background:#EEF2F8}
.opt-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--br);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt-btn.on .opt-dot{border-color:var(--nv);background:var(--nv)}
.opt-dot-inner{width:6px;height:6px;border-radius:50%;background:#fff}
.opt-text{text-align:left}
.opt-lbl{font-size:16px;font-weight:400;color:#111;line-height:1.3}.opt-btn.on .opt-lbl{font-weight:700}
.opt-sub{font-size:13px;color:#333;margin-top:1px;display:none}
.pay-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pay-btn{padding:10px 12px;border-radius:9px;border:2px solid var(--br);background:#fff;cursor:pointer;user-select:none;display:flex;align-items:center;gap:10px}
.pay-btn.on{border-color:var(--nv);background:#EEF2F8}
.pay-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--br);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pay-btn.on .pay-dot{border-color:var(--nv);background:var(--nv)}
.pay-icon{font-size:18px;flex-shrink:0}
.pay-name{font-size:16px;font-weight:400;color:#111}.pay-btn.on .pay-name{font-weight:700}
.pay-sub-txt{font-size:13px;color:#111;margin-top:1px}
.pay-detail{margin-top:6px;background:#F5F8FF;border-radius:9px;padding:11px 13px;border:1.5px solid #C5D0E0;display:none}
.pay-detail.show{display:block}
.pay-acct{font-size:15px;font-weight:700;color:var(--nv);margin-bottom:2px}
.pay-name2{font-size:14px;color:#111}
.pay-note{font-size:14px;color:#222;margin-top:6px;line-height:1.6;background:#fff;border-radius:7px;padding:8px 10px;border:1px solid var(--br)}
.sch-box{margin-top:9px;display:none}.sch-box.show{display:block}
.day-row{display:flex;gap:7px;margin-bottom:8px}
.day-btn{flex:1;padding:10px 12px;border-radius:8px;border:2px solid var(--br);background:#fff;cursor:pointer;user-select:none;display:flex;align-items:center;gap:7px}
.day-btn.on{border-color:var(--nv);background:#EEF2F8}
.day-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--br);flex-shrink:0}
.day-btn.on .day-dot{border-color:var(--nv);background:var(--nv)}
.day-name{font-size:17px;font-weight:400;color:#111}.day-date{font-size:15px;font-weight:400;color:#555;margin-top:2px}.day-btn.on .day-name{font-weight:800;color:var(--red)}.day-btn.on .day-date{font-weight:700;color:var(--red)}
.time-lbl{font-size:14px;font-weight:700;color:#111;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;opacity:1}
.time-note{font-size:14px;color:#111;font-weight:600;margin-bottom:7px}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.tslot{padding:8px 3px;border-radius:7px;border:1.5px solid var(--br);background:#fff;cursor:pointer;text-align:center;user-select:none;font-size:15px;font-weight:700;color:var(--nv);line-height:1.2}
.tslot .tnote{font-size:12px;font-weight:600;color:#111;margin-top:2px}
.tslot.on{background:var(--nv);border-color:var(--nv);color:#fff}
.tslot.on .tnote{color:rgba(255,255,255,.7)}
.tslot.off{opacity:.3;cursor:not-allowed}
.reception-box{margin-top:9px;padding-top:9px;border-top:1px solid var(--br)}
.reception-lbl{font-size:14px;font-weight:700;color:#111;margin-bottom:6px;text-align:center}
.rec-row{display:flex;gap:7px}
.rec-btn{flex:1;padding:9px 8px;border-radius:8px;border:1.5px solid var(--br);background:#fff;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;gap:6px}
.rec-btn:active{background:#EEF2F8}
.rec-icon{font-size:18px}.rec-lbl{font-size:15px;font-weight:700;color:#111}.rec-sub{font-size:13px;font-weight:600;color:#111}
.time-result{margin-top:9px;background:#EEF2F8;border-radius:8px;padding:9px 12px;font-size:14px;color:var(--nv);font-weight:700;text-align:center}
.no-slot{background:#FEF3C7;border-radius:8px;padding:9px 12px;font-size:13px;color:#92400E;font-weight:700;text-align:center;line-height:1.6;margin-top:7px}
.scard{background:#fff;border-radius:11px;border:1px solid var(--br);padding:13px 15px;text-align:left;margin-bottom:14px}
.sr{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #EDE8DF;gap:8px}
.sr:last-child{border:none;padding-top:9px}
.srl{color:#4b5563;flex-shrink:0;font-size:14px;font-weight:600;padding-top:1px}
.srv{text-align:right}
.srv-f{font-size:15px;font-weight:600;color:#111}
.srv-vi{font-size:12px;color:#6b7280;margin-top:2px}
.srv-tot{font-size:19px;font-weight:700;color:var(--nv)}
.item-sr{align-items:center}
.item-main{flex:1;min-width:0;text-align:left}
.item-right{display:flex;align-items:center;justify-content:flex-end;gap:18px;min-width:130px;flex-shrink:0}
.item-qty{min-width:28px;text-align:center;font-size:15px;font-weight:700;color:#4b5563}
.item-price{min-width:84px;text-align:right;font-size:19px;font-weight:700;color:#111}
.faq-item{border-bottom:1px solid var(--br);background:#fff}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:16px;cursor:pointer;gap:10px;touch-action:manipulation}
.faq-q-txt{font-size:15px;font-weight:700;color:var(--nv);flex:1}
.faq-arr{font-size:16px;color:var(--mu);transition:transform .2s}
.faq-arr.open{transform:rotate(180deg)}
.faq-a{display:none;padding:0 16px 16px;font-size:14px;color:#333;line-height:1.8}
.faq-a.open{display:block}
.mem-bg{background:#FAF8F4;padding-bottom:24px}
.mem-hero{background:var(--nv);padding:22px 16px 18px;text-align:center;color:#fff}
.mem-hero-icon{font-size:40px;margin-bottom:9px}
.mem-hero-title{font-size:19px;font-weight:700;margin-bottom:3px}
.mem-hero-sub{font-size:13px;color:#9FE1CB;line-height:1.6}
.perks{display:flex;background:#fff;border-bottom:1px solid var(--br)}
.perk{flex:1;padding:12px 4px;text-align:center}
.perk-icon{font-size:21px;margin-bottom:3px}
.perk-lbl{font-size:12px;font-weight:700;color:var(--nv);line-height:1.4}
.mem-form{padding:16px 14px}
.mem-form-title{font-size:15px;font-weight:700;color:var(--nv);margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--br)}
.member-card{background:#fff;border:2px solid var(--nv);border-radius:12px;padding:16px 14px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.member-title{font-size:14px;font-weight:700;color:var(--nv);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--br)}
.member-note-card{background:#fff;border:1px solid var(--br);border-radius:12px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.member-note-grid{display:flex;gap:10px}
.member-note-item{flex:1;text-align:center;background:#FAF8F4;border-radius:10px;padding:12px 8px;border:1px solid var(--br)}
.member-note-icon{font-size:20px;margin-bottom:4px}
.member-note-text{font-size:12px;font-weight:700;color:var(--nv);line-height:1.5}
.field{margin-bottom:12px}
.field label{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--nv);margin-bottom:5px}
.req{color:var(--red)}
.field input{width:100%;background:#fff;border:1.5px solid var(--br);border-radius:9px;padding:11px 13px;font-size:16px;color:var(--nv);outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--nv)}
.field input.err{border-color:var(--red);background:#fff5f5}
.err-msg{font-size:12px;color:var(--red);margin-top:4px;display:none}
.err-msg.show{display:block}
.csbox{background:#fff;border:1.5px solid var(--br);border-radius:11px;overflow:hidden}
.csbox.err{border-color:var(--red)}
.ctype-row{display:flex;border-bottom:1px solid var(--br)}
.ctype{flex:1;padding:11px 4px;text-align:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--mu);border-bottom:2.5px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.ctype.on{color:var(--nv);border-bottom-color:var(--nv);background:#F5F8FF}
.cinput-wrap{padding:11px 13px}
.cinput-wrap input{width:100%;border:none;outline:none;font-size:15px;color:var(--nv);background:transparent;font-family:inherit}
.chint{font-size:12px;color:var(--mu);padding:0 13px 9px}
.reg-btn{width:100%;background:var(--nv);color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:4px}
.hotline-box{margin:6px 14px 4px;background:#EEF2F8;border-radius:10px;padding:6px 10px;text-align:center}
.hl-sub{font-size:13px;color:var(--mu);margin-bottom:4px}
.hl-num{font-size:16px;font-weight:700;color:var(--nv)}
.profile-hdr{display:none}
.avatar{display:none}
.profile-name{font-size:22px;font-weight:700;margin-bottom:4px}
.mem-badge{display:inline-flex;align-items:center;gap:0;background:transparent;color:#fff;font-size:13px;font-weight:600;padding:0;border-radius:0}
.profile-body{padding:0 14px 18px;background:#FAF8F4}
.info-card{background:#243f6b;border-radius:12px;border:none;margin-top:10px;overflow:hidden}
.info-card-hdr{padding:10px 14px;font-size:12px;font-weight:700;color:var(--mu);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--br);background:#FAFAFA}
.mi{display:flex;align-items:flex-start;gap:0;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.16)}
.mi:last-child{border:none}
.mi-icon{display:none}
.mi-lbl{font-size:12px;color:rgba(255,255,255,.72);display:inline}
.mi-val{font-size:14px;font-weight:600;color:#fff;margin-top:2px;line-height:1.35}
.action-row{display:flex;gap:8px;margin-top:10px}
.act-btn{flex:1;padding:8px 8px;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;text-align:center;border:none}
.btn-edit{background:#EEF2F8;color:var(--nv)}.btn-out{background:#FFF0F0;color:var(--red)}
.order-tabs{display:flex;border-bottom:1px solid var(--br)}
.otab{flex:1;padding:11px 4px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;color:var(--mu);border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none}
.otab.on{color:var(--nv);border-bottom-color:var(--nv)}
.order-card{background:#fff;border-radius:10px;border:1px solid var(--br);margin:8px 14px 0;overflow:hidden}
.order-card-hdr{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br)}
.order-id{font-size:13px;font-weight:700;color:var(--nv)}.order-time{font-size:12px;color:var(--mu)}
.st{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px}
.st-pending{background:#FEF3C7;color:#92400E}.st-done{background:#D1FAE5;color:#065F46}
.order-items-txt{padding:9px 12px;font-size:13px;color:#444;line-height:1.6;border-bottom:1px solid var(--br)}
.order-footer{padding:9px 12px}
.order-total{font-size:15px;font-weight:700;color:var(--nv)}
.empty-state{text-align:center;padding:28px 20px;color:var(--mu)}

/* ===== POPUP SẢN PHẨM ===== */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.popup-overlay.show{display:flex}
.popup-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:75vh;overflow:hidden;box-shadow:0 -18px 50px rgba(0,0,0,.18);display:flex;flex-direction:column}
.popup-overlay.show .popup-sheet{transform:translateY(0)}
.popup-handle{width:40px;height:5px;background:#D8DDE5;border-radius:999px;margin:10px auto 0;flex-shrink:0}
.popup-close{position:absolute;top:8px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.92);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#667085;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.popup-layout{display:flex;flex:1;min-height:0;position:relative}
.popup-img-col{width:40%;flex-shrink:0;background:#F6F8FB;overflow:hidden}
.popup-emoji{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:56px;background:#F6F8FB}
.popup-emoji img{width:100%;height:100%;object-fit:contain;display:block}
.popup-content-col{width:60%;display:flex;flex-direction:column;overflow:hidden}
.popup-header{padding:12px 12px 8px;flex-shrink:0}
.popup-name-zh{font-size:20px;line-height:1.25;font-weight:800;color:var(--nv);letter-spacing:-.2px;padding-right:28px}
.popup-name-vi{font-size:14px;color:#667085;margin-top:3px;font-weight:500}
.popup-price{font-size:24px;font-weight:800;color:var(--gd);margin-top:6px;line-height:1.15}
.popup-divider{height:1px;background:#E7ECF3;margin:0 12px;flex-shrink:0}
.popup-body{padding:8px 12px 0;overflow-y:auto;flex:1}
.popup-desc-lbl{font-size:12px;font-weight:800;color:#7A8699;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.popup-desc{font-size:16px;color:#243041;line-height:1.65;margin-bottom:8px}
.popup-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.popup-tag{font-size:13px;padding:4px 10px;border-radius:999px;background:#EEF2F8;color:var(--nv);font-weight:700}
.popup-action-bar{padding:8px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom,12px));background:#fff;border-top:1px solid #F0F3F8;flex-shrink:0}
.popup-add-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--nv);color:#fff;border:none;border-radius:10px;padding:13px 10px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(27,58,107,.18)}
.popup-add-btn.in-cart{background:var(--gd);color:#111}
.popup-qty-wrap{display:flex;align-items:center;justify-content:center;gap:14px;width:100%}
.popup-qty-btn{width:40px;height:40px;border-radius:50%;border:2px solid var(--nv);background:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--nv);font-weight:800;touch-action:manipulation}

async function loadFromSheet(){
  const CACHE_KEY='mya_sheet_cache';
  const CACHE_TTL=5*60*1000;
  try{
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached){const {ts,data}=JSON.parse(cached);if(Date.now()-ts<CACHE_TTL){_applySheetData(data);return;}}
  }catch(e){}
  try{
    const r=await fetch(SCRIPT_URL+'?action=all',{method:'GET'});
    if(!r.ok)throw new Error('fail');
    const res=await r.json();
    if(res&&res.ok&&res.data){
      _applySheetData(res.data);
      try{localStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),data:res.data}));}catch(e){}
    }
  }catch(e){console.warn('Sheet offline:',e.message);}
  // Load FAQ riêng
  try{
    const rf=await fetch(SCRIPT_URL+'?action=faq',{method:'GET'});
    if(rf.ok){const rj=await rf.json();if(rj&&rj.ok&&Array.isArray(rj.data)){SHEET_FAQS=rj.data;renderFaq();}}
  }catch(e){}
}
function fixImgUrl(url){
  if(!url)return'';
  // Chuyển link Drive gốc thành link trực tiếp
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return'https://drive.google.com/uc?export=view&id='+m[1];
  return url;
}
function mapSheetType(type){
  const t=String(type||'').trim().toLowerCase();
  if(['drinks','drink','cafe','coffee','tea','beverage'].includes(t))return{group:'cafe',tab:'drinks'};
  if(['food','breakfast','meal','snack'].includes(t))return{group:'cafe',tab:'food'};
  if(['combo','set'].includes(t))return{group:'cafe',tab:'combo'};
  if(['sv','souvenir','gift','luuniem','lưu niệm'].includes(t))return{group:'shop',tab:'sv'};
  if(['lc','local','specialty','dacsan','đặc sản'].includes(t))return{group:'shop',tab:'lc'};
  return null;
}
function _applySheetData(d){
  // ── Apply menu từ sheet ──────────────────────────────────────
  if(Array.isArray(d.menu)&&d.menu.length>0){
    const nextCafe=[],nextShop=[];
    d.menu.forEach(function(item){
      const id=String(item.id||'').trim();
      const mapped=mapSheetType(item.type);
      if(!id||!mapped)return;
      const p=Number(item.price)||0;
      const vi=(item.name&&item.name.vi)||'';
      const zh=(item.name&&item.name.zh)||'';
      const en=(item.name&&item.name.en)||'';
      const img=fixImgUrl(item.image||'');
      if(p)P[id]=p;
      if(vi)Nvi[id]=vi;
      if(zh)Nzh[id]=zh;
      if(en)Nen[id]=en;
      if(item.delivery_rule)DR[id]=item.delivery_rule.toLowerCase();
      DESC[id]=DESC[id]||{};
      if(item.desc){
        if(item.desc.vi)DESC[id].vi=item.desc.vi;
        if(item.desc.zh)DESC[id].zh=item.desc.zh;
        if(item.desc.en)DESC[id].en=item.desc.en;
      }
      if(item.tags)DESC[id].tags=item.tags;
      if(img)DESC[id].image=img;

      const base={
        id:id,
        e:item.emoji||'☕',
        vi:vi||id,
        zh:zh||vi||id,
        en:en||vi||id,
        p:p,
        t:mapped.tab
      };

      if(mapped.group==='cafe'){
        if(mapped.tab==='combo'){
          base.dvi=(item.desc&&item.desc.vi)||'';
          base.dzh=(item.desc&&item.desc.zh)||base.dvi;
          base.den=(item.desc&&item.desc.en)||base.dvi;
        }
        nextCafe.push(base);
      }else{
        base.cvi=mapped.tab==='sv'?'Lưu niệm':'Đặc sản';
        base.czh=mapped.tab==='sv'?'纪念品':'特产';
        nextShop.push(base);
      }
    });

    if(nextCafe.length||nextShop.length){
      CAFE.length=0; SHOP.length=0;
      nextCafe.forEach(i=>CAFE.push(i));
      nextShop.forEach(i=>SHOP.push(i));
    }
    [...CAFE,...SHOP].forEach(i=>{P[i.id]=i.p;Nvi[i.id]=i.vi;Nzh[i.id]=i.zh;Nen[i.id]=i.en;T[i.id]=i.t;});
    renderAll();
  }
  // ── Apply FAQ từ sheet ──────────────────────────────────────
  if(Array.isArray(d.faq)&&d.faq.length>0){
    SHEET_FAQS=d.faq;
    renderFaq();
  }
  // ── Apply config ─────────────────────────────────────────────
  const c=d.config||{};
  if(c.vcb_account){const el=document.getElementById('vcb-acct');if(el)el.innerHTML='STK: <b>'+c.vcb_account+'</b>';}
  if(c.vcb_owner){const el=document.getElementById('vcb-owner');if(el)el.textContent=c.vcb_owner+(c.vcb_bank?' · '+c.vcb_bank:'');}
  if(c.wechat_pay_id){const el=document.getElementById('wechat-acct');if(el)el.innerHTML='WeChat ID: <b>'+c.wechat_pay_id+'</b>';}
  if(c.alipay_id){const el=document.getElementById('alipay-acct');if(el)el.innerHTML='Alipay ID: <b>'+c.alipay_id+'</b>';}
  if(c.hotline){const el=document.getElementById('rec-hotline');if(el)el.textContent=c.hotline;}
  if(c.wechat_reception){const el=document.getElementById('rec-wechat');if(el)el.textContent=c.wechat_reception;}
  if(c.wifi_name&&c.wifi_password){const faq=FAQS.find(q=>q.vi==='WiFi?');if(faq){faq.avi=c.wifi_name+' — '+c.wifi_password;faq.azh='WiFi：'+c.wifi_name+'  密码：'+c.wifi_password;faq.aen=c.wifi_name+' — '+c.wifi_password;renderFaq();}}
}

function t(k){return(TXT[lang]||TXT.zh)[k]||k;}
function iname(i){return lang==='zh'?i.zh:lang==='en'?i.en:i.vi;}
function isub(i){return lang==='zh'?i.vi:lang==='en'?i.vi:i.zh;}
function getItemImage(item){const d=DESC[item.id]||{};return d.image||item.img||'';}
function renderThumb(item){const img=getItemImage(item);if(img){return '<div class="em" onclick="openPopup(\''+item.id+'\')"><img src="'+img+'" alt="'+iname(item).replace(/"/g,'&quot;')+'" onerror="this.parentNode.textContent=\''+item.e+'\';this.remove()"></div>';}return '<div class="em" onclick="openPopup(\''+item.id+'\')">'+item.e+'</div>'; }

// ===== POPUP =====
let curPopupId=null;
function openPopup(id){
  curPopupId=id;
  const all=[...CAFE,...SHOP];
  const item=all.find(i=>i.id===id);
  if(!item)return;
  const d=DESC[id]||{};
  const nameMain=lang==='zh'?item.zh:lang==='en'?item.en:item.vi;
  const nameSub=lang==='vi'?'':item.vi;
  const desc=(d[lang]||d.vi||'');
  const tags=(d.tags&&d.tags[lang])||[];
  // Ảnh từ sheet nếu có, fallback về emoji
  const imgUrl=d.image||item.img||'';
  const emojiEl=document.getElementById('pop-emoji');
  if(imgUrl){
    emojiEl.innerHTML='<img src="'+imgUrl+'" style="width:100%;height:100%;object-fit:contain;display:block;cursor:zoom-in" onclick="openImgFull(this.src)" onerror="this.parentNode.textContent=String.fromCodePoint(0x2615)">';
  } else {
    emojiEl.textContent=item.e;
  }
  document.getElementById('pop-name-main').textContent=nameMain;
  document.getElementById('pop-name-sub').textContent=nameSub;
  document.getElementById('pop-price').textContent=ff(item.p);
  document.getElementById('pop-desc-lbl').textContent=t('pop_desc_lbl');
  document.getElementById('pop-desc').textContent=desc||(lang==='zh'?'暂无介绍':'Chưa có mô tả');
  document.getElementById('pop-tags').innerHTML=tags.map(tg=>'<span class="popup-tag">'+tg+'</span>').join('');
  renderPopupAction();
  document.getElementById('popupOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function renderPopupAction(){
  const id=curPopupId;if(!id)return;
  const q=cart[id]||0;
  const el=document.getElementById('pop-action');
  if(q===0){
    el.innerHTML='<button class="popup-add-btn" onclick="popAdd()">'+t('pop_add')+' · '+ff(P[id])+'</button>';
  }else{
    el.innerHTML='<div class="popup-qty-wrap"><div class="popup-qty-btn" onclick="popMinus()">−</div><div class="popup-qty-num">'+q+'</div><div class="popup-qty-btn plus" onclick="popPlus()">+</div></div>';
  }
}
function popAdd(){const ok=upd(curPopupId,1);if(ok){setTimeout(()=>{closePopup();},300);}}
function popPlus(){upd(curPopupId,1);renderPopupAction();}
function popMinus(){upd(curPopupId,-1);renderPopupAction();}
function closePopup(){document.getElementById('popupOverlay').classList.remove('show');document.body.style.overflow='';curPopupId=null;}
function closePopupIfOverlay(e){if(e.target===document.getElementById('popupOverlay'))closePopup();}
function openImgFull(src){
  let lb=document.getElementById('imgLightbox');
  if(!lb){
    lb=document.createElement('div');
    lb.id='imgLightbox';
    lb.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
    lb.onclick=()=>lb.remove();
    document.body.appendChild(lb);
  }
  lb.innerHTML='<img src="'+src+'" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:8px">';
  document.body.appendChild(lb);
}

function updateRoomWrap(){const show=!!member&&(deliveryMode==='room'||hasComboItem());document.getElementById('roomWrap').className='room-input-wrap'+(show?' show':'');if(show){document.getElementById('room-lbl').innerHTML=t('room_lbl')+' <span style="color:var(--red)">*</span>';document.getElementById('roomInput').placeholder=t('room_ph');}}
function setDelivery(m){deliveryMode=m;document.getElementById('opt-room').className='opt-btn'+(m==='room'?' on':'');document.getElementById('opt-counter').className='opt-btn'+(m==='counter'?' on':'');updateRoomWrap();}
function setTimeMode(m){timeMode=m;curTime='';document.getElementById('opt-now').className='opt-btn'+(m==='now'?' on':'');document.getElementById('opt-sch').className='opt-btn'+(m==='sch'?' on':'');document.getElementById('schBox').className='sch-box'+(m==='sch'?' show':'');if(m==='sch')buildSlots();}
function selDay(d){curDay=d;curTime='';document.getElementById('d-today').className='day-btn'+(d==='today'?' on':'');document.getElementById('d-tomorrow').className='day-btn'+(d==='tomorrow'?' on':'');document.getElementById('time-result').innerHTML='';buildSlots();}
function buildSlots(){const now=new Date();const isToday=curDay==='today';let minAvail=isToday?(now.getHours()*60+now.getMinutes()+30):0;minAvail=Math.ceil(minAvail/30)*30;const all=[];for(let m=6*60;m<=21*60+30;m+=30)all.push({t:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'),min:m});const sa=document.getElementById('slot-area'),noteEl=document.getElementById('timeNote');if(isToday&&all.filter(s=>s.min>=minAvail).length===0){sa.innerHTML='<div class="no-slot">⚠️ '+(lang==='zh'?'今日已结束':lang==='en'?'No slots today':'Hôm nay hết slot')+'</div>';noteEl.textContent='';return;}noteEl.textContent=isToday?t('time_note_today'):'';sa.innerHTML='<div class="time-grid">'+all.map(s=>{const ok=!isToday||s.min>=minAvail;return'<div class="tslot'+(ok?'':' off')+'"'+(ok?' onclick="pickSlot(\''+s.t+'\',this)"':'')+'>'+s.t+'</div>';}).join('')+'</div>';}
function pickSlot(t_,el){curTime=t_;document.querySelectorAll('.tslot:not(.off)').forEach(b=>b.classList.remove('on'));el.classList.add('on');document.getElementById('time-result').innerHTML='<div class="time-result">✅ '+(curDay==='today'?t('today'):t('tomorrow'))+' · '+t_+'</div>';}

// ── COMBO RULE ──────────────────────────────────────────────
function hasComboItem(){return Object.keys(cart).some(k=>T[k]==='combo');}
function hasNonComboItem(){return Object.keys(cart).some(k=>T[k]&&T[k]!=='combo');}
function showToast(msg){const el=document.getElementById('toast-msg');if(!el)return;el.textContent=msg;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);}
function showMixWarn(msg){showToast(msg);const el=document.getElementById('mix-warn');if(el){el.textContent=msg;el.style.display='block';clearTimeout(el._t2);el._t2=setTimeout(()=>el.style.display='none',4000);}}
function isAfterCutoff(){const now=new Date();return now.getHours()*60+now.getMinutes()>=21*60+30;}
function applyAfterCutoffRule(){
  const hasFoodDrink=Object.keys(cart).some(k=>T[k]&&T[k]!=='combo'&&T[k]!=='sv'&&T[k]!=='lc');
  const cw=document.getElementById('cutoff-warn');
  if(!hasFoodDrink||!isAfterCutoff()){if(cw)cw.style.display='none';return;}
  // Hiện cảnh báo trên phương thức giao hàng
  const warnMsg=lang==='zh'?'⚠️ 已过21:30，订单将预约明日配送':lang==='en'?'⚠️ After 21:30 — order scheduled for tomorrow':'⚠️ Sau 21:30 — đơn sẽ được giao ngày mai!';
  if(cw){cw.textContent=warnMsg;cw.style.display='block';}
  // Ẩn cả 2 nút thời gian (立即/预约), chỉ giữ slot ngày mai
  document.getElementById('opt-now').closest('.opt-row').style.display='none';
  // Tự set ngày mai + hẹn giờ
  timeMode='sch';curDay='tomorrow';curTime='';
  document.getElementById('opt-now').className='opt-btn';
  document.getElementById('opt-sch').className='opt-btn on';
  document.getElementById('schBox').className='sch-box show';
  document.getElementById('d-today').style.display='none';
  document.getElementById('d-tomorrow').className='day-btn on';
  document.getElementById('time-result').innerHTML='';
  buildSlots();
}
function hasShopCart(){return Object.keys(cart).some(k=>T[k]==='sv'||T[k]==='lc');}
function applyShopRule(){
  const el=document.getElementById('normal-opts');
  const cs=document.getElementById('combo-summary');
  if(hasShopCart()){
    if(el)el.style.display='none';
    if(cs){
      cs.style.display='block';
      const msg=lang==='zh'?'🛍️ 工作人员将联系您确认取货时间':lang==='en'?'🛍️ Staff will contact you to confirm pickup':'🛍️ Nhân viên sẽ liên hệ xác nhận thời gian nhận hàng';
      cs.innerHTML='<div style="font-size:15px;font-weight:700;color:var(--red);line-height:1.8">'+msg+'</div>';
    }
  } else if(!hasComboItem()){
    if(el)el.style.display='';
    if(cs)cs.style.display='none';
  }
}
function applyComboRule(){
  const bfWarn=document.getElementById('bf-warn');
  if(!hasComboItem()){resetComboRule();return;}
  if(hasNonComboItem()){
    Object.keys(cart).forEach(k=>{const itm=[...CAFE,...SHOP].find(i=>i.id===k);if(itm&&itm.t==='combo')delete cart[k];});
    const msg={vi:'⚠️ Đơn ĐẶT MÓN phải đặt riêng. Đã xóa combo — vui lòng đặt đơn riêng!',zh:'⚠️ 点餐订单须单独下单，已移除套餐，请单独下单！',en:'⚠️ ORDER items must be ordered separately. Combo removed!'};
    if(bfWarn){bfWarn.style.display='block';const wtxt=document.getElementById('bf-warn-txt');if(wtxt)wtxt.textContent=msg[lang]||msg.vi;}
    updateUI();openCart();return;
  }
  if(bfWarn)bfWarn.style.display='none';
  setDelivery('counter');
  curDay='tomorrow';timeMode='sch';curTime='';
  // Ẩn toàn bộ nút, hiện text tóm tắt
  document.getElementById('normal-opts').style.display='none';
  document.getElementById('schBox').className='sch-box show';
  document.querySelector('.day-row').style.display='none';
  document.getElementById('d-tomorrow').className='day-btn on';
  document.getElementById('time-result').innerHTML='';
  // Hiện dòng tóm tắt
  const tom=new Date();tom.setDate(tom.getDate()+1);

function upd(id,d){
  const isCombo=T[id]==='combo';
  const isShop=T[id]==='sv'||T[id]==='lc';
  const hasCafeInCart=()=>Object.keys(cart).some(k=>T[k]&&T[k]!=='sv'&&T[k]!=='lc');
  const hasShopInCart=()=>Object.keys(cart).some(k=>T[k]==='sv'||T[k]==='lc');
  if(d>0){
    // Sau 21:30: vẫn cho thêm vào giỏ, hiện toast thông báo
    if(!isCombo&&!isShop&&isAfterCutoff()){
      showToast(lang==='zh'?'⏰ 已过21:30，订单将预约明日配送':lang==='en'?'⏰ After 21:30 — order will be scheduled for tomorrow':'⏰ Sau 21:30 — đơn sẽ được giao ngày mai!');
    }
    // Thêm combo nhưng giỏ đang có món thường
    if(isCombo&&hasNonComboItem()){
      const msg={vi:'⚠️ Đặt món sáng phải đặt đơn riêng! Vui lòng đặt riêng.',zh:'⚠️ 点餐须单独下单！请单独下单。',en:'⚠️ Morning order must be placed separately!'};
      showMixWarn(msg[lang]||msg.vi);return;
    }
    // Thêm món thường nhưng giỏ đang có combo
    if(!isCombo&&hasComboItem()){
      const msg={vi:'⚠️ Giỏ đang có đơn đặt món sáng! Vui lòng đặt đơn riêng.',zh:'⚠️ 购物车已有点餐订单！请单独下单。',en:'⚠️ Cart has a morning order! Please place a separate order.'};
      showMixWarn(msg[lang]||msg.vi);return;
    }
    // Thêm shop nhưng giỏ đang có cafe/food
    if(isShop&&hasCafeInCart()){
      const msg={vi:'⚠️ Đồ lưu niệm/đặc sản phải đặt đơn riêng!',zh:'⚠️ 纪念品/特产须单独下单！',en:'⚠️ Souvenirs must be ordered separately!'};
      showMixWarn(msg[lang]||msg.vi);return;
    }
    // Thêm cafe/food nhưng giỏ đang có shop
    if(!isShop&&hasShopInCart()){
      const msg={vi:'⚠️ Giỏ đang có đồ lưu niệm/đặc sản! Vui lòng đặt đơn riêng.',zh:'⚠️ 购物车已有纪念品/特产！请单独下单。',en:'⚠️ Cart has souvenir items! Please place a separate order.'};
      showMixWarn(msg[lang]||msg.vi);return;
    }
  }
  cart[id]=Math.max(0,(cart[id]||0)+d);if(!cart[id])delete cart[id];renderAll();if(curPopupId===id)renderPopupAction();return true;
}

  const hasFoodDrink=Object.keys(cart).some(k=>T[k]&&T[k]!=='combo'&&T[k]!=='sv'&&T[k]!=='lc');
  if(hasFoodDrink&&isAfterCutoff()){
    const msg=lang==='zh'?'⏰ 已过21:30，为您预约明日配送 →':lang==='en'?'⏰ After 21:30 — scheduling for tomorrow →':'⏰ Sau 21:30 — đặt cho ngày mai nhé →';
    showToast(msg);
    setTimeout(()=>openCart(),2500);
  } else {
    openCart();
  }
}

e(),tom=new Date(now);tom.setDate(tom.getDate()+1);const fmt=d=>d.getDate()+'/'+(d.getMonth()+1);document.getElementById('dt-today').textContent=fmt(now);document.getElementById('dt-tomorrow').textContent=fmt(tom);const ccLbl=document.getElementById('cc-lbl'),ccInp=document.getElementById('contact2');if(member){ccLbl.textContent=t('greet')+', '+member.name+' 👋';ccInp.readOnly=true;ccInp.style.background='#F5F8FF';ccInp.style.fontWeight='700';}else{ccLbl.textContent=t('cc_lbl');ccInp.readOnly=false;ccInp.style.background='';ccInp.style.fontWeight='';}goPage('pgCart');applyComboRule();applyShopRule();applyAfterCutoffRule();}

async function placeOrder(){
  const isMember=!!member;const contact=isMember?member.contact:document.getElementById('contact2').value.trim();
  if(!isMember&&!contact){document.getElementById('contact2').classList.add('err');document.getElementById('contact2').focus();document.getElementById('warn').className='warn on';return;}
  let roomNo='';if(isMember&&(deliveryMode==='room'||hasComboItem())){roomNo=document.getElementById('roomInput').value.trim();if(!roomNo){document.getElementById('roomInput').classList.add('err');document.getElementById('warn-room').className='warn on';document.getElementById('roomInput').focus();return;}}else if(!isMember){roomNo=contact;}
  const tot=Object.entries(cart).reduce((s,[k,v])=>s+(P[k]||0)*v,0);
  const note=(document.getElementById('note').value+' '+document.getElementById('snote').value).trim();
  const itemsText=Object.entries(cart).map(([k,v])=>Nzh[k]+'×'+v).join(', ');
  const lines=Object.entries(cart).map(([k,v])=>'• '+Nvi[k]+' ('+Nzh[k]+') × '+v+'  —  '+ff((P[k]||0)*v)).join('\n');
  const dIcon=deliveryMode==='room'?'🚪':'🏪';const dVI=B[deliveryMode==='room'?'del_room':'del_counter'].vi;
  const tIcon=timeMode==='now'?'⚡':'📅';const dayVI=curDay==='today'?'Hôm nay':'Ngày mai';const tVI=timeMode==='now'?'Giao ngay':dayVI+(curTime?' '+curTime:'');
  const payVI=B['pay_'+payMode].vi;const pIcons={vcb:'🏦',wechat:'',alipay:'🔵',cash:'💵'};
  const ctIcon=isMember?(member.contactType==='wechat'?'':member.contactType==='zalo'?'🔵':'📱'):'📋';
  const roomTG=roomNo?'\nPhòng: '+roomNo:'';
  const memLine=isMember?'\n👤 '+member.name+'  '+ctIcon+': '+contact+roomTG:'\n📋 '+contact;
  const msg='☕ ĐƠN MYA CAFÉ'+memLine+'\n'+dIcon+' '+dVI+'  '+tIcon+' '+tVI+'\n'+pIcons[payMode]+' '+payVI+'\n─────────────\n'+lines+'\n─────────────\n💰 '+ff(tot)+(note?'\n📝 '+note:'');
  const btn=document.getElementById('obtn');btn.disabled=true;document.getElementById('order-lbl').textContent=t('sending');
  // Gửi đơn lên Apps Script — Apps Script lo lưu sheet + gửi Telegram
  try{
    const itemsVI=Object.entries(cart).map(([k,v])=>Nvi[k]+'×'+v).join(', ');
    const _p=new URLSearchParams({
      action:'add_order',
      member_id:isMember?(member.member_id||''):'',
      member_name:isMember?member.name:'',
      contact:isMember?member.contact:contact,
      contact_type:isMember?(member.contactType||''):'',
      room_no:roomNo,
      items_zh:itemsText,
      items_vi:itemsVI,
      items_lines:lines,
      total:tot,
      delivery:deliveryMode,
      time_slot:timeMode==='now'?'Giao ngay':(curDay==='today'?'Hôm nay':'Ngày mai')+(curTime?' '+curTime:''),
      payment:payVI,
      note:note,
      lang:lang
    });
    const _r=await fetch(SCRIPT_URL+'?'+_p.toString());
    const _j=await _r.json();
    if(!_j.ok){throw new Error(_j.error||'error');}
  }catch(e){
    btn.disabled=false;
    document.getElementById('order-lbl').textContent=t('order');
    alert(lang==='zh'?'⚠️ 网络错误，请重试':lang==='en'?'⚠️ Network error, please retry':'⚠️ Lỗi mạng, vui lòng thử lại');
    return;
  }
  if(isMember){orderHistory.push({id:Date.now().toString().slice(-6),items:itemsText,total:tot,time:Date.now(),status:'pending'});try{localStorage.setItem('mya_orders',JSON.stringify(orderHistory));}catch(e){}}
  const noticeKey='ok_notice_'+deliveryMode+'_'+(timeMode==='now'?'now':'sch');
  const dayLocal=curDay==='today'?t('today'):t('tomorrow');const tLocal=timeMode==='now'?t('now').replace(/^[^\w\u4e00-\u9fa5]+/,''):dayLocal+(curTime?' '+curTime:'');
  const schNote=timeMode==='sch'&&curTime?'\n📅 '+tLocal:'';
  document.getElementById('ok-notice').textContent=t(noticeKey)+schNote;
  const rows=Object.entries(cart).map(([k,v])=>{const foreign=lang==='zh'?Nzh[k]:lang==='en'?Nen[k]:Nvi[k];const allItems=[...CAFE,...SHOP];const itm=allItems.find(i=>i.id===k);const subDesc=itm?(lang==='zh'?itm.dzh:lang==='en'?itm.den:itm.dvi)||'':'';const subHtml=subDesc?'<div class="srv-vi" style="font-size:11px;opacity:.7">'+subDesc+'</div>':'';const lbl=lang==='vi'?'<div class="srv-f">'+foreign+'</div>'+subHtml:'<div class="srv-f">'+foreign+'</div><div class="srv-vi">'+Nvi[k]+'</div>'+subHtml;return itemRow(lbl,v,ff((P[k]||0)*v));}).join('');
  const whoLbl=isMember?'👤 '+bl('lbl_name'):'📋 '+bl('lbl_contact');const whoVal='<div class="srv-f">'+(isMember?member.name:contact)+'</div>';
  const roomRow2=roomNo?srRow(''+bl('lbl_room'),'<div class="srv-f">'+roomNo+'</div>'):'';;
  const delRow=srRow(dIcon+' '+bl('lbl_del'),bv(deliveryMode==='room'?'del_room':'del_counter'));
  const timeKeyVI=timeMode==='now'?'Giao ngay':dayVI+(curTime?' '+curTime:'');const timeKeyLocal=timeMode==='now'?t('now').replace(/^[^\w\u4e00-\u9fa5]+/,''):dayLocal+(curTime?' '+curTime:'');
  const timeVal=lang==='vi'?'<div class="srv-f">'+timeKeyVI+'</div>':'<div class="srv-f">'+timeKeyLocal+'</div><div class="srv-vi">'+timeKeyVI+'</div>';
  const payRow=srRow(pIcons[payMode]+' '+bl('lbl_pay'),bv('pay_'+payMode));
  const noteRow=note?srRow('📝 '+bl('lbl_note'),'<div class="srv-f">'+note+'</div>'):'';
  const totRow='<div class="sr"><div class="srl">'+bl('lbl_total')+'</div><div class="srv"><div class="srv-tot">'+ff(tot)+'</div></div></div>';
  document.getElementById('sucCard').innerHTML=rows+srRow(whoLbl,whoVal)+roomRow2+delRow+srRow(tIcon+' '+bl('lbl_time'),timeVal)+payRow+noteRow+totRow;
  goPage('pgOk');
  cart={};
  btn.disabled=false;
  document.getElementById('order-lbl').textContent=t('order');
}


function showLoginForm(){const f=document.getElementById('loginForm');if(f)f.style.display=f.style.display==='none'?'block':'none';}
async function loginMember(){
  const name=document.getElementById('li-name').value.trim();
  const contact=document.getElementById('li-contact').value.trim();
  const errEl=document.getElementById('err-login');
  if(!name||!contact){errEl.style.display='block';return;}
  errEl.style.display='none';
  try{
    const r=await fetch(SCRIPT_URL+'?action=check_member&name='+encodeURIComponent(name)+'&contact='+encodeURIComponent(contact));
    const res=await r.json();
    if(res.ok&&res.data&&res.data.exists){
      const m=res.data.member;
      member={name:m.name,contact:m.contact,contactType:m.contact_type,joinDate:Date.now(),member_id:m.member_id};
      registeredNames.push(name.toLowerCase().replace(/ /g,''));
      saveAll();updateGreetBar();renderMember();
    }else{errEl.style.display='block';}
  }catch(e){errEl.style.display='block';}
}

  await loadData();
  updateGreetBar();

init();
